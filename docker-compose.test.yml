services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payments_test
      POSTGRES_PASSWORD: payments_test
      POSTGRES_DB: payments_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_test"]
      interval: 3s
      timeout: 2s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5673:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  tests:
    build: .
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.test.txt &&
        alembic upgrade head &&
        python -m pytest tests/ -v --tb=short
      "
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://payments_test:payments_test@postgres-test:5432/payments_test
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq-test:5672/
      APP_API_KEY: test-api-key
    depends_on:
      postgres-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
